<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>NAN — Signing out…</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;display:flex;align-items:center;justify-content:center;
      min-height:100vh;font-family:'Inter',system-ui,sans-serif;flex-direction:column;gap:16px;}
    svg{opacity:.8;}
    p{color:#555;font-size:.85rem;}
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 324 480" width="32" height="48">
    <path d="M255,0 L84,167 L71,163 L0,97 L0,378 L246,132 L255,110 Z" fill="#7000ff"/>
    <path d="M69,480 L240,313 L253,317 L324,383 L324,102 L78,348 L69,370 Z" fill="#7000ff"/>
  </svg>
  <p>Signing out…</p>
  <script>
    // Wipe ALL storage — no React, no Dynamic, no Wagmi
    try {
      localStorage.clear();
      sessionStorage.clear();
      // Clear all cookies for this domain
      document.cookie.split(';').forEach(function(c) {
        document.cookie = c.trim().split('=')[0] + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
      });
    } catch(e) {}
    // Redirect to landing after short delay
    setTimeout(function() {
      window.location.replace('/');
    }, 300);
  </script>
</body>
</html>
